networks:
  infra:
    name: cv-infra
    external: true

services:

  user-service:
    build: ./services/user-service
    container_name: cv-user-service
    ports:
      - "8001:8001"
    environment:
      ZEEBE_ADDRESS: host.docker.internal:26500
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks: [infra]
    restart: unless-stopped

  verification-service:
    build: ./services/verification-service
    container_name: cv-verification-service
    ports:
      - "8002:8002"
    environment:
      ZEEBE_ADDRESS: host.docker.internal:26500
      USER_SERVICE_URL: http://user-service:8001
      ATTESTATION_SERVICE_URL: http://attestation-service:8004
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      user-service:
        condition: service_started
      notification-service:
        condition: service_started
      attestation-service:
        condition: service_started
    networks: [infra]
    restart: unless-stopped

  reporting-service:
    build: ./services/reporting-service
    container_name: cv-reporting-service
    ports:
      - "8003:8003"
    environment:
      ZEEBE_ADDRESS: host.docker.internal:26500
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ATTESTATION_SERVICE_URL: http://attestation-service:8004
    depends_on:
      notification-service:
        condition: service_started
      attestation-service:
        condition: service_started
    networks: [infra]
    restart: unless-stopped

  attestation-service:
    build: ./services/attestation-service
    container_name: cv-attestation-service
    ports:
      - "8004:8004"
    environment:
      ATTESTATION_INTERVAL_SECONDS: "60"
    networks: [infra]
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    container_name: cv-notification-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: notification-service
    networks: [infra]
    restart: unless-stopped
