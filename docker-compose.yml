networks:
  infra:
    name: cv-infra
    external: true

services:

  user-service:
    build: ./services/user-service
    container_name: cv-user-service
    ports:
      - "8001:8001"
    environment:
      ZEEBE_ADDRESS: host.docker.internal:26500
    networks: [infra]
    restart: unless-stopped

  verification-service:
    build: ./services/verification-service
    container_name: cv-verification-service
    ports:
      - "8002:8002"
    environment:
      ZEEBE_ADDRESS: host.docker.internal:26500
      USER_SERVICE_URL: http://user-service:8001
    depends_on:
      user-service:
        condition: service_started
    networks: [infra]
    restart: unless-stopped

  reporting-service:
    build: ./services/reporting-service
    container_name: cv-reporting-service
    ports:
      - "8003:8003"
    environment:
      ZEEBE_ADDRESS: host.docker.internal:26500
    networks: [infra]
    restart: unless-stopped

  attestation-service:
    build: ./services/attestation-service
    container_name: cv-attestation-service
    ports:
      - "8004:8004"
    environment:
      ATTESTATION_INTERVAL_SECONDS: "60"
    networks: [infra]
    restart: unless-stopped

