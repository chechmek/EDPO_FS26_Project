services:
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: edpo-kafka
    ports:
      - "19092:9092"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: edpo-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  postgres:
    image: postgres:16-alpine
    container_name: edpo-postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  post-service:
    build:
      context: .
      dockerfile: services/post-service/Dockerfile
    container_name: edpo-post-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8001:8001"
    environment:
      SERVICE_NAME: post-service
      LOG_LEVEL: INFO
      DB_DSN: postgresql://post_user:post_pass@postgres:5432/post_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POST_EVENTS_TOPIC: social.post.events
      INTERACTION_EVENTS_TOPIC: social.interaction.events

  interaction-service:
    build:
      context: .
      dockerfile: services/interaction-service/Dockerfile
    container_name: edpo-interaction-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8002:8002"
    environment:
      SERVICE_NAME: interaction-service
      LOG_LEVEL: INFO
      DB_DSN: postgresql://interaction_user:interaction_pass@postgres:5432/interaction_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INTERACTION_EVENTS_TOPIC: social.interaction.events

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: edpo-notification-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      interaction-service:
        condition: service_started
    ports:
      - "8003:8003"
    environment:
      SERVICE_NAME: notification-service
      LOG_LEVEL: INFO
      DB_DSN: postgresql://notification_user:notification_pass@postgres:5432/notification_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INTERACTION_EVENTS_TOPIC: social.interaction.events
      KAFKA_GROUP_ID: notification-service
      KAFKA_AUTO_OFFSET_RESET: earliest
